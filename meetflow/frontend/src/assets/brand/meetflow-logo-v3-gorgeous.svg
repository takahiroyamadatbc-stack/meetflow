<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 210" width="680" height="210">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#B8860B"/>
      <stop offset="45%" stop-color="#F0C24B"/>
      <stop offset="100%" stop-color="#FF6F59"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: unchanged, cascading rounded-square tiles -->
  <g transform="translate(14, 14)">
    <rect x="6" y="80" width="96" height="96" rx="20" fill="#17A398" transform="rotate(-12 54 128)"/>
    <rect x="46" y="46" width="90" height="90" rx="18" fill="#FF6F59" transform="rotate(-4 91 91)"/>
    <rect x="82" y="14" width="82" height="82" rx="16" fill="#FFC145" transform="rotate(5 123 55)"/>
    <rect x="134" y="4" width="44" height="44" rx="11" fill="#EF5DA8" transform="rotate(12 156 26)"/>
  </g>

  <!-- Wordmark: elegant serif, gold gradient accent -->
  <text x="228" y="128"
        font-family="'Playfair Display', 'Georgia', 'Times New Roman', serif"
        font-size="76"
        font-weight="700"
        letter-spacing="-0.5"
        fill="#2B2140">meet<tspan fill="url(#goldGradient)" font-style="italic">flow</tspan></text>

  <!-- Tagline -->
  <text x="230" y="160"
        font-family="'Playfair Display', 'Georgia', serif"
        font-size="18"
        font-weight="500"
        letter-spacing="3"
        fill="#A8935A">暇な時間を、カラフルに。</text>
</svg>
