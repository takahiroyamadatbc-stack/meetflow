name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          # Lambdaランタイム(python3.13)に合わせる
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: 依存関係インストール
        run: pip install -r requirements-dev.txt

      - name: pytest実行
        env:
          PYTHONPATH: layers/common/python
        run: python -m pytest -v

  frontend-ci:
    name: Frontend (lint/typecheck/test/build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        run: npm ci

      - name: lint
        run: npm run lint

      - name: 型チェック
        run: npm run typecheck

      - name: テスト実行
        # フロントエンドはPhase1時点でテストファイルが未整備のため
        # 追加され次第自動的に実行対象になるようpassWithNoTestsを付与
        run: npm run test -- --passWithNoTests

      - name: ビルド
        run: npm run build

  infra-synth:
    name: Infra (cdk synth)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: infra/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 依存関係インストール
        run: |
          pip install -r requirements.txt
          npm install -g aws-cdk

      - name: cdk synth
        # 環境非依存(account/region未指定)スタックのためAWS認証情報は不要
        run: cdk synth --all
